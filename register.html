<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <title>Registrasi</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
    <!-- Background -->
    <style>
      body {
        min-height: 100vh;
        display: flex;
        align-items: center;
        background-image: url("img/header-bg.jpg");
        background-repeat: no-repeat;
        background-size: cover;
        background-position: center;
      }
    </style>
  </head>

  <body class="bg-light d-flex justify-content-center align-items-center vh-100">
    <div class="card p-4 shadow" style="width: 350px">
      <h3 class="text-center">Registrasi</h3>

      <input type="text" id="nama" class="form-control mt-3" placeholder="Nama Lengkap" />
      <input type="email" id="email" class="form-control mt-3" placeholder="Email" />
      <input type="password" id="password" class="form-control mt-3" placeholder="Password" />

      <button class="btn btn-success w-100 mt-3" onclick="register()">Register</button>

      <p class="text-center mt-3">
        Sudah punya akun?
        <a href="login.html">Login</a>
      </p>
    </div>

    <script>
      function register() {
        const name = document.getElementById("nama").value.trim();
        const email = document.getElementById("email").value.trim();
        const pass = document.getElementById("password").value.trim();

        // Validasi kosong
        if (!name || !email || !pass) {
          alert("Semua data harus diisi!");
          return;
        }

        // Validasi email
        if (!email.includes("@")) {
          alert("Email tidak valid!");
          return;
        }

        // Validasi password
        if (pass.length < 5) {
          alert("Password minimal 5 karakter!");
          return;
        }

        // Simpan data
        const userData = {
          nama: name,
          email: email,
          password: pass,
        };

        localStorage.setItem("user", JSON.stringify(userData));

        alert("Registrasi berhasil! Silakan login.");
        window.location.href = "login.html";
      }
    </script>

    <footer class="bg-dark text-white text-center py-3 position-fixed bottom-0 w-100">@Copyright by 241010010_Fauzan Kamil Amirulloh_TRPL</footer>
  </body>
</html>
